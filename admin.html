<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin – Kanteliset</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
  padding: 40px;
  color: #333;
  display: none;
}

h1 {
  font-size: 34px;
  margin-bottom: 30px;
}

.section-title {
  margin-top: 60px;
  font-size: 24px;
  border-bottom: 3px solid #ddd;
  padding-bottom: 8px;
}

.summary-box {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  margin-bottom: 40px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card {
  background: white;
  padding: 24px;
  margin-bottom: 25px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card h3 {
  margin-top: 0;
}

.pill {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(0,0,0,0.05);
  margin-right: 8px;
  font-size: 13px;
}

.muted {
  opacity: 0.65;
}

.not-responded {
  background: #fff4f4;
  padding: 10px 15px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.highlight {
  background: #fdf8f3;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

/* ohjelmailmoitukset (uusi ulkoasu) */
.announce-card{
  background: #fff;
  padding: 22px;
  margin-bottom: 25px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.10);
}

.announce-top{
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
}

.announce-title{
  margin: 0;
  font-size: 18px;
  font-weight: 800;
}

.announce-sub{
  margin-top: 6px;
  opacity: .7;
  font-size: 13px;
}

.badge-row{
  display:flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.badge-pink{
  display:inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,95,162,0.12);
  border: 1px solid rgba(255,95,162,0.25);
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.badge-gray{
  display:inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.08);
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.desc-box{
  margin-top: 14px;
  background: #fdf8f3;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px;
  padding: 12px 14px;
  line-height: 1.6;
}

.kv-grid{
  margin-top: 14px;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 760px){
  .kv-grid{ grid-template-columns: 1fr; }
}

.kv{
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px;
  padding: 10px 12px;
  background: #fff;
}
.kv .k{
  font-size: 11px;
  letter-spacing: .10em;
  text-transform: uppercase;
  opacity: .6;
}
.kv .v{
  margin-top: 4px;
  font-weight: 700;
}
</style>
</head>

<body>

<h1>Admin – Kanteliset</h1>

<div id="rsvpSummary" class="summary-box"></div>
<div id="programSummary" class="summary-box"></div>

<div id="programs"></div>
<div id="responded"></div>
<div id="notResponded"></div>

<script>
// ===============================
// 🔐 ADMIN SUOJAUS (varmempi caseille)
// ===============================
const loginRaw = sessionStorage.getItem("login");
if (!loginRaw) window.location.href = "/";

let login = null;
try { login = JSON.parse(loginRaw); } catch { login = null; }
if (!login) window.location.href = "/";

const role = login.Role ?? login.role ?? "";
const familyId = login.FamilyId ?? login.familyId ?? "";

const allowedAdmins = [
  "ADMIN-SINI",
  "ADMIN-PETE",
  "ADMIN-KAASO",
  "ADMIN-BESTMAN",
  "ADMIN-SEREMONIAM"
];

if (role !== "admin" || !allowedAdmins.includes(familyId)) {
  window.location.href = "/";
}

document.body.style.display = "block";


// ===============================
// API URLIT
// ===============================
const rsvpBaseUrl =
  "https://fa-kanteliset-chdhg2g0aub8f0gy.westeurope-01.azurewebsites.net/api/rsvp/";

const programsUrl =
  "https://fa-kanteliset-chdhg2g0aub8f0gy.westeurope-01.azurewebsites.net/api/admin/programs";


// ===============================
// HELPERS
// ===============================
function escapeHtml(str){
  return (str ?? "")
    .toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function safeDate(iso){
  if(!iso) return "-";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return escapeHtml(iso);
  return d.toLocaleString("fi-FI");
}


// ===============================
// RSVP DATA (nimet + listaus)
// ===============================
const FAMILY_NAME_BY_ID = {
  "KANTELINEN-05": "Hannu ja Elina",
  "KANTELINEN-789": "Hanna-Riikka, Väinö ja Aleksanteri",
  "AALTONEN-029": "Äiti ja iskä Aaltonen",
  "KOISTINEN-033": "Päivi ja Peku",
  "KOKKONEN-0458": "Henna, Aava ja Marko",
  "OVASKA-059": "Heidi, Sami, Saaga ja Sampo",
  "JÄNTTI-067": "Petja",
  "KURISJÄRVI-077": "Milla",
  "SALIN-083": "Janika",
  "AALAS-094": "Veera ja Andreas",
  "HUR-101": "Indigo ja Tobias",
  "PUSENIUS-1155": "Ira",
  "HEISKA-1289": "Jenna",
  "KOSKIPALO-1341": "Angelica ja Jere",
  "KAITARANTA-1447": "Mira",
  "VARTTINEN-1555": "Inga ja Lauri",
  "AUVINEN-1618": "Mika ja Anu",
  "MUSTONEN-1792": "Jaana",
  "PULKKINEN-1814": "Samuli ja Teija",
  "VESTERINEN-1999": "Ville",
  "SYRJÄ-2013": "Aleksi ja Andrea",
  "LINDBLOM-2581": "Tia ja Pate",
  "HELAKORPI-2291": "Kati ja avec",
  "YRJÖLÄ-2338": "Pinja, Arno, Marjo ja Ari",
  "RAUTAVUORI-2491": "Emma ja Saku",
  "GAZDAG-2580": "Rosa ja Ákoz",
  "OKSMAN-2695": "Essi",
  "HURSKAINEN-2766": "Senni ja Jere",
  "SVENSSON-2818": "Alisa ja Ted",
  "TESTI-299": "Sini ja Petri",
  "TESTI-288": "Hääpari",
  "KOPONEN-688": "Hanne-Maarit ja Pekka",
  "ANTTOLAINEN-488": "Jaana ja avec",
  "LAITINEN-1985": "Maarit"
};

function getFamilyLabel(id){
  return FAMILY_NAME_BY_ID[id] ? `${FAMILY_NAME_BY_ID[id]} (${id})` : id;
}

// ✅ tämä puuttui aiemmin: id-lista
const familyIds = Object.keys(FAMILY_NAME_BY_ID);

let summary = { fri:0, sat:0, sun:0, spa:0 };

async function loadRsvp(){

  const responded = [];
  const notResponded = [];

  summary = { fri:0, sat:0, sun:0, spa:0 };

  for(const id of familyIds){

    try{
      const res = await fetch(rsvpBaseUrl + id);

      if(!res.ok){
        notResponded.push(id);
        continue;
      }

      const data = await res.json();

      summary.fri += data.friCount || 0;
      summary.sat += data.satCount || 0;
      summary.sun += data.sunCount || 0;

      if(data.paymentSummary && data.paymentSummary.includes("Spa")){
        summary.spa += data.friCount || 0;
      }

      responded.push(data);

    }catch{
      notResponded.push(id);
    }
  }

  renderRsvpSummary();
  renderResponded(responded);
  renderNotResponded(notResponded);
}

function renderRsvpSummary(){
  document.getElementById("rsvpSummary").innerHTML = `
    <h2>RSVP Yhteenveto</h2>
    <p><strong>Perjantai:</strong> ${summary.fri} hlö</p>
    <p><strong>Lauantai:</strong> ${summary.sat} hlö</p>
    <p><strong>Sunnuntai:</strong> ${summary.sun} hlö</p>
    <p><strong>Spa:</strong> ${summary.spa} hlö</p>
  `;
}

function renderResponded(list){

  const container = document.getElementById("responded");
  container.innerHTML = `<div class="section-title">RSVP – Vastanneet</div>`;

  list.forEach(data=>{

    const spaNames =
      (data.friAttendees || [])
        .map(p=>escapeHtml(p.name))
        .join("<br>");

    const diets =
      [...(data.satAttendees || []), ...(data.sunAttendees || [])]
      .filter(p=>p.diet && p.diet.trim() !== "" && p.diet !== "-")
      .map(p=>`${escapeHtml(p.name)}: ${escapeHtml(p.diet)}`)
      .join("<br>");

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${escapeHtml(data.displayName)}</h3>

      <div class="highlight">
        <strong>Osallistuminen:</strong><br>
        Pe: ${data.friAttending ? "Kyllä" : "Ei"} (${data.friCount})<br>
        La: ${data.satAttending ? "Kyllä" : "Ei"} (${data.satCount})<br>
        Su: ${data.sunAttending ? "Kyllä" : "Ei"} (${data.sunCount})
      </div>

      <p><strong>Majoitus:</strong> ${data.accommodation ? "Kyllä" : "Ei"}</p>

      ${spaNames ? `<p><strong>Spa-osallistujat:</strong><br>${spaNames}</p>` : ""}

      ${diets ? `<p><strong>Erikoisruokavaliot:</strong><br>${diets}</p>` : ""}

      <p><strong>Muistiinpanot:</strong><br>${escapeHtml(data.notes || "-")}</p>

      <p><strong>Maksuyhteenveto:</strong><br>${escapeHtml(data.paymentSummary || "-")}</p>
    `;

    container.appendChild(card);
  });
}

function renderNotResponded(list){
  const container=document.getElementById("notResponded");
  container.innerHTML=`<div class="section-title">Ei vielä vastanneet</div>`;

  list.forEach(id=>{
    const div=document.createElement("div");
    div.className="not-responded";
    div.innerText = getFamilyLabel(id);
    container.appendChild(div);
  });
}


// ===============================
// PROGRAMS
// ===============================
async function loadPrograms(){

  const container = document.getElementById("programs");
  const summaryBox = document.getElementById("programSummary");

  const fallbackPrograms = [
    {
      name: "Heidi Ovaska",
      email: "heidi.ovaska82@gmail.com",
      phone: "0442756950",
      type: "Puhe",
      description: "Puhe hääparille",
      duration: 10,
      needsMic: true,
      createdUtc: "2026-02-26T09:40:30.2357955+00:00"
    }
  ];

  function render(programs){

    const sorted = (programs || []).slice().sort((a,b) => {
      const da = new Date(a.createdUtc || a.CreatedUtc || 0).getTime();
      const db = new Date(b.createdUtc || b.CreatedUtc || 0).getTime();
      return db - da;
    });

    summaryBox.innerHTML = `
      <h2>Ohjelmailmoitukset</h2>
      <p><strong>Yhteensä:</strong> ${sorted.length}</p>
    `;

    container.innerHTML = `<div class="section-title">Ohjelmailmoitukset</div>`;

    if(sorted.length === 0){
      container.innerHTML += `<div class="card">Ei ohjelmailmoituksia.</div>`;
      return;
    }

    sorted.forEach(p => {

      const name = escapeHtml(p.name ?? p.Name ?? "");
      const type = escapeHtml(p.type ?? p.Type ?? "");
      const email = escapeHtml(p.email ?? p.Email ?? "");
      const phone = escapeHtml(p.phone ?? p.Phone ?? "");
      const desc = escapeHtml(p.description ?? p.Description ?? "");
      const duration = (p.duration ?? p.Duration ?? "-");
      const needsMic = (p.needsMic ?? p.NeedsMic) ? true : false;
      const createdUtc = (p.createdUtc ?? p.CreatedUtc ?? "");

      const card = document.createElement("div");
      card.className = "announce-card";

      card.innerHTML = `
        <div class="announce-top">
          <div>
            <h3 class="announce-title">${type || "Ohjelma"} — ${name || "-"}</h3>
            <div class="announce-sub">Luotu: ${safeDate(createdUtc)}</div>

            <div class="badge-row">
              ${type ? `<span class="badge-pink">${type}</span>` : ""}
              <span class="badge-gray">${duration} min</span>
              <span class="badge-gray">${needsMic ? "Tarvitsee mikin" : "Ei tekniikkaa"}</span>
            </div>
          </div>
        </div>

        <div class="desc-box">
          <strong>Kuvaus</strong><br>
          ${desc || "-"}
        </div>

        <div class="kv-grid">
          <div class="kv">
            <div class="k">Sähköposti</div>
            <div class="v">
              ${email ? `<a href="mailto:${encodeURIComponent(p.email ?? p.Email ?? "")}">${email}</a>` : "-"}
            </div>
          </div>
          <div class="kv">
            <div class="k">Puhelin</div>
            <div class="v">
              ${phone ? `<a href="tel:${escapeHtml(p.phone ?? p.Phone ?? "")}">${phone}</a>` : "-"}
            </div>
          </div>
        </div>
      `;

      container.appendChild(card);
    });
  }

  try{
    const res = await fetch(programsUrl);

    if(!res.ok){
      container.innerHTML = `<div class="section-title">Ohjelmailmoitukset</div>
      <div class="card">Haku epäonnistui (${res.status})</div>`;
      render(fallbackPrograms);
      return;
    }

    let programs = await res.json();

    if(!Array.isArray(programs) || programs.length === 0){
      programs = fallbackPrograms;
    }

    render(programs);

  }catch{
    container.innerHTML = `<div class="section-title">Ohjelmailmoitukset</div>
    <div class="card">Virhe haussa</div>`;
    render(fallbackPrograms);
  }
}


// ===============================
// INIT
// ===============================
loadRsvp();
loadPrograms();

</script>

</body>
</html>
