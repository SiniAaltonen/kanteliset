<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin – Kanteliset</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
  padding: 40px;
  color: #333;
  display: none;
}

h1 {
  font-size: 34px;
  margin-bottom: 30px;
}

.section-title {
  margin-top: 60px;
  font-size: 24px;
  border-bottom: 3px solid #ddd;
  padding-bottom: 8px;
}

.summary-box {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  margin-bottom: 40px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card {
  background: white;
  padding: 24px;
  margin-bottom: 25px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card h3 { margin-top: 0; }

.pill {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(0,0,0,0.05);
  margin-right: 8px;
  font-size: 13px;
}

.muted { opacity: 0.65; }

.not-responded {
  background: #fff4f4;
  padding: 10px 15px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.highlight {
  background: #fdf8f3;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

/* Ohjelmailmoitukset: uusi siistimpi kortti (ei vaikuta RSVP) */
.announce-card{
  background: #fff;
  padding: 22px;
  margin-bottom: 25px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.10);
}
.announce-title{ margin: 0; font-size: 18px; font-weight: 800; }
.announce-sub{ margin-top: 6px; opacity: .7; font-size: 13px; }
.badge-row{ display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.badge-pink{
  display:inline-block; padding: 6px 10px; border-radius: 999px;
  background: rgba(255,95,162,0.12); border: 1px solid rgba(255,95,162,0.25);
  font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
}
.badge-gray{
  display:inline-block; padding: 6px 10px; border-radius: 999px;
  background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.08);
  font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
}
.desc-box{
  margin-top: 14px; background: #fdf8f3; border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px; padding: 12px 14px; line-height: 1.6;
}
.kv-grid{
  margin-top: 14px; display:grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
@media (max-width: 760px){ .kv-grid{ grid-template-columns: 1fr; } }
.kv{
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px;
  padding: 10px 12px;
  background: #fff;
}
.kv .k{ font-size: 11px; letter-spacing: .10em; text-transform: uppercase; opacity: .6; }
.kv .v{ margin-top: 4px; font-weight: 700; }

/* ===============================
   SEATING CHART (Pöytäkartta)
   =============================== */

.seating-card{
  background:#fff;
  padding:22px;
  margin-bottom:25px;
  border-radius:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  border:1px solid rgba(0,0,0,0.10);
}

.seating-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.seating-title{
  margin:0;
  font-size:18px;
  font-weight:800;
}

.seating-sub{
  margin-top:6px;
  opacity:.7;
  font-size:13px;
}

.seating-wrap{
  border:1px solid rgba(0,0,0,0.10);
  border-radius:16px;
  overflow:hidden;
  background:#fafafa;
}

/* Skaalautuva canvas pohjakuvan mukaan */
.seating-stage{
  position:relative;
  width:100%;
  aspect-ratio: 1136 / 768; /* sama fiilis kuin sun kuvassa; vaihda jos oma kuva eri */
}

.seating-stage img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* Overlay missä pöydät ja labelit */
.seating-overlay{
  position:absolute;
  inset:0;
}

.table{
  position:absolute;
  transform: translate(-50%, -50%);
  border-radius:999px;
  background: rgba(44, 110, 195, 0.90);
  border: 2px solid rgba(20,70,140,0.9);
  box-shadow: 0 12px 24px rgba(0,0,0,0.18);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:800;
  user-select:none;
}

.table.small{ width:72px; height:72px; }
.table.medium{ width:86px; height:86px; }
.table.large{ width:96px; height:96px; }

.table .ttext{
  line-height:1.1;
  font-size:12px;
  padding:6px;
}

.table .ttext .hl{
  display:block;
  font-size:13px;
}

.table:hover{
  filter: brightness(1.03);
  outline: 3px solid rgba(255,95,162,0.35);
  cursor: default;
}

/* Hääpari-boksi */
.table.head{
  border-radius:12px;
  width:110px;
  height:46px;
  background: rgba(44, 110, 195, 0.95);
}

.table.head .ttext{ font-size:12px; }

/* Pieni selite oikeaan alanurkkaan */
.seating-note{
  position:absolute;
  right:14px;
  bottom:14px;
  background: rgba(255,255,255,0.88);
  border:1px solid rgba(0,0,0,0.10);
  border-radius:14px;
  padding:10px 12px;
  font-size:12px;
  opacity:.9;
  max-width: 320px;
}
</style>
</head>

<body>

<h1>Admin – Kanteliset</h1>

<div id="rsvpSummary" class="summary-box"></div>
<div id="programSummary" class="summary-box"></div>
<div id="seatingChart" class="seating-card"></div>

<div id="programs"></div>
<div id="responded"></div>
<div id="notResponded"></div>

<script>
// ===============================
// 🔐 ADMIN SUOJAUS (case-varma, ei riko vanhaa)
// ===============================
const loginRaw = sessionStorage.getItem("login");
if (!loginRaw) window.location.href = "/";

let login = null;
try { login = JSON.parse(loginRaw); } catch { login = null; }
if (!login) window.location.href = "/";

const role = login.Role ?? login.role ?? "";
const familyId = login.FamilyId ?? login.familyId ?? "";

const allowedAdmins = [
  "ADMIN-SINI",
  "ADMIN-PETE",
  "ADMIN-KAASO",
  "ADMIN-BESTMAN",
  "ADMIN-SEREMONIAM"
];

if (role !== "admin" || !allowedAdmins.includes(familyId)) {
  window.location.href = "/";
}

document.body.style.display = "block";

// ===============================
// API URLIT
// ===============================
const rsvpBaseUrl =
  "https://fa-kanteliset-chdhg2g0aub8f0gy.westeurope-01.azurewebsites.net/api/rsvp/";

const programsUrl =
  "https://fa-kanteliset-chdhg2g0aub8f0gy.westeurope-01.azurewebsites.net/api/admin/programs";

// ===============================
// HELPERS
// ===============================
function escapeHtml(str){
  return (str ?? "")
    .toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function safeDate(iso){
  if(!iso) return "-";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return escapeHtml(iso);
  return d.toLocaleString("fi-FI");
}

// ===============================
// RSVP DATA (täsmälleen sama id-lista kuin toimivassa versiossa)
// ===============================
const familyIds = [
  "KANTELINEN-05","KANTELINEN-789","AALTONEN-029","KOISTINEN-033",
  "KOKKONEN-0458","OVASKA-059","JÄNTTI-067","KURISJÄRVI-077",
  "SALIN-083","AALAS-094","HUR-101","PUSENIUS-1155",
  "HEISKA-1289","KOSKIPALO-1341","KAITARANTA-1447","VARTTINEN-1555",
  "AUVINEN-1618","MUSTONEN-1792","PULKKINEN-1814","VESTERINEN-1999",
  "SYRJÄ-2013","LINDBLOM-2581","HELAKORPI-2291","YRJÖLÄ-2338",
  "RAUTAVUORI-2491","GAZDAG-2580","OKSMAN-2695","HURSKAINEN-2766",
  "SVENSSON-2818","TESTI-299","TESTI-288",
  "KOPONEN-688","ANTTOLAINEN-488","LAITINEN-1985"
];

// ✅ sama nimimappaus kuin sun C#-konfigissa
const FAMILY_NAME_BY_ID = {
  "KANTELINEN-05": "Hannu ja Elina",
  "KANTELINEN-789": "Hanna-Riikka, Väinö ja Aleksanteri",
  "AALTONEN-029": "Äiti ja iskä Aaltonen",
  "KOISTINEN-033": "Päivi ja Peku",
  "KOKKONEN-0458": "Henna, Aava ja Marko",
  "OVASKA-059": "Heidi, Sami, Saaga ja Sampo",
  "JÄNTTI-067": "Petja",
  "KURISJÄRVI-077": "Milla",
  "SALIN-083": "Janika",
  "AALAS-094": "Veera ja Andreas",
  "HUR-101": "Indigo ja Tobias",
  "PUSENIUS-1155": "Ira",
  "HEISKA-1289": "Jenna",
  "KOSKIPALO-1341": "Angelica ja Jere",
  "KAITARANTA-1447": "Mira",
  "VARTTINEN-1555": "Inga ja Lauri",
  "AUVINEN-1618": "Mika ja Anu",
  "MUSTONEN-1792": "Jaana",
  "PULKKINEN-1814": "Samuli ja Teija",
  "VESTERINEN-1999": "Ville",
  "SYRJÄ-2013": "Aleksi ja Andrea",
  "LINDBLOM-2581": "Tia ja Pate",
  "HELAKORPI-2291": "Kati ja avec",
  "YRJÖLÄ-2338": "Pinja, Arno, Marjo ja Ari",
  "RAUTAVUORI-2491": "Emma ja Saku",
  "GAZDAG-2580": "Rosa ja Ákoz",
  "OKSMAN-2695": "Essi",
  "HURSKAINEN-2766": "Senni ja Jere",
  "SVENSSON-2818": "Alisa ja Ted",
  "TESTI-299": "Sini ja Petri",
  "TESTI-288": "Hääpari",
  "KOPONEN-688": "Hanne-Maarit ja Pekka",
  "ANTTOLAINEN-488": "Jaana ja avec",
  "LAITINEN-1985": "Maarit"
};

function getFamilyLabel(id){
  return FAMILY_NAME_BY_ID[id] ? `${FAMILY_NAME_BY_ID[id]} (${id})` : id;
}

let summary = { fri:0, sat:0, sun:0, spa:0 };

async function loadRsvp(){

  const responded = [];
  const notResponded = [];

  summary = { fri:0, sat:0, sun:0, spa:0 };

  for(const id of familyIds){

    try{
      const res = await fetch(rsvpBaseUrl + id);

      if(!res.ok){
        notResponded.push(id);
        continue;
      }

      const data = await res.json();

      summary.fri += data.friCount || 0;
      summary.sat += data.satCount || 0;
      summary.sun += data.sunCount || 0;

      if(data.paymentSummary && data.paymentSummary.includes("Spa")){
        summary.spa += data.friCount || 0;
      }

      responded.push(data);

    }catch{
      notResponded.push(id);
    }
  }

  renderRsvpSummary();
  renderResponded(responded);
  renderNotResponded(notResponded);
}

function renderRsvpSummary(){
  document.getElementById("rsvpSummary").innerHTML = `
    <h2>RSVP Yhteenveto</h2>
    <p><strong>Perjantai:</strong> ${summary.fri} hlö</p>
    <p><strong>Lauantai:</strong> ${summary.sat} hlö</p>
    <p><strong>Sunnuntai:</strong> ${summary.sun} hlö</p>
    <p><strong>Spa:</strong> ${summary.spa} hlö</p>
  `;
}

function renderResponded(list){

  const container = document.getElementById("responded");
  container.innerHTML = `<div class="section-title">RSVP – Vastanneet</div>`;

  list.forEach(data=>{

    const spaNames =
      (data.friAttendees || [])
        .map(p=>escapeHtml(p.name))
        .join("<br>");

    const diets =
      [...(data.satAttendees || []), ...(data.sunAttendees || [])]
      .filter(p=>p.diet && p.diet.trim() !== "" && p.diet !== "-")
      .map(p=>`${escapeHtml(p.name)}: ${escapeHtml(p.diet)}`)
      .join("<br>");

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${escapeHtml(data.displayName)}</h3>

      <div class="highlight">
        <strong>Osallistuminen:</strong><br>
        Pe: ${data.friAttending ? "Kyllä" : "Ei"} (${data.friCount})<br>
        La: ${data.satAttending ? "Kyllä" : "Ei"} (${data.satCount})<br>
        Su: ${data.sunAttending ? "Kyllä" : "Ei"} (${data.sunCount})
      </div>

      <p><strong>Majoitus:</strong> ${data.accommodation ? "Kyllä" : "Ei"}</p>

      ${spaNames ? `<p><strong>Spa-osallistujat:</strong><br>${spaNames}</p>` : ""}

      ${diets ? `<p><strong>Erikoisruokavaliot:</strong><br>${diets}</p>` : ""}

      <p><strong>Muistiinpanot:</strong><br>${escapeHtml(data.notes || "-")}</p>

      <p><strong>Maksuyhteenveto:</strong><br>${escapeHtml(data.paymentSummary || "-")}</p>
    `;

    container.appendChild(card);
  });
}

function renderNotResponded(list){
  const container=document.getElementById("notResponded");
  container.innerHTML=`<div class="section-title">Ei vielä vastanneet</div>`;

  list.forEach(id=>{
    const div=document.createElement("div");
    div.className="not-responded";
    div.innerText = getFamilyLabel(id);
    container.appendChild(div);
  });
}

// ===============================
// PROGRAMS (jätetään toimivaksi; jos haluat, voidaan myöhemmin tehdä fallback)
// ===============================
async function loadPrograms(){

  const container=document.getElementById("programs");
  const summaryBox=document.getElementById("programSummary");

  try{
    const res=await fetch(programsUrl);
    if(!res.ok){
      container.innerHTML=`<div class="section-title">Ohjelmailmoitukset</div>
      <div class="card">Haku epäonnistui (${res.status})</div>`;
      return;
    }

    const programs=await res.json();

    summaryBox.innerHTML=`
      <h2>Ohjelmailmoitukset</h2>
      <p><strong>Yhteensä:</strong> ${programs.length}</p>
    `;

    container.innerHTML=`<div class="section-title">Ohjelmailmoitukset</div>`;

    programs.forEach(p=>{

      const card = document.createElement("div");
      card.className = "announce-card";

      card.innerHTML = `
        <h3 class="announce-title">${escapeHtml(p.type)} — ${escapeHtml(p.name)}</h3>
        <div class="announce-sub">Luotu: ${safeDate(p.createdUtc)}</div>

        <div class="badge-row">
          <span class="badge-pink">${escapeHtml(p.type)}</span>
          <span class="badge-gray">${p.duration} min</span>
          <span class="badge-gray">${p.needsMic ? "Tarvitsee mikin" : "Ei tekniikkaa"}</span>
        </div>

        <div class="desc-box">
          <strong>Kuvaus</strong><br>
          ${escapeHtml(p.description || "-")}
        </div>

        <div class="kv-grid">
          <div class="kv">
            <div class="k">Sähköposti</div>
            <div class="v">${escapeHtml(p.email || "-")}</div>
          </div>
          <div class="kv">
            <div class="k">Puhelin</div>
            <div class="v">${escapeHtml(p.phone || "-")}</div>
          </div>
        </div>
      `;

      container.appendChild(card);
    });

  }catch{
    container.innerHTML=`<div class="section-title">Ohjelmailmoitukset</div>
    <div class="card">Virhe haussa</div>`;
  }
}

// ===============================
// SEATING CHART (Pöytäkartta)
// ===============================

// 1) Vaihda tähän sun pohjakuvan tiedostonimi (laita se images-kansioon)
//    Voit käyttää samaa kuvaa jonka lähetit (tallenna esim. images/poytakartta.png)
const SEATING_BG_IMAGE = "images/poytakartta.png";

// 2) Pöytien sijainnit prosentteina (x,y) suhteessa koko kuvaan
//    Nämä on “lähellä” sun kuvassa olevia paikkoja. Säädä myöhemmin 1–2% kerrallaan.
const TABLES = [
  { id:"head", label:"Hääpari", size:"head", x: 36, y: 9, seats: 2 },

  { id:"T1", label:"8 hlö",  size:"medium", x: 15, y: 18, seats: 8 },
  { id:"T2", label:"8 hlö",  size:"medium", x: 10, y: 29, seats: 8 },

  { id:"T3", label:"10 hlö", size:"large",  x: 26, y: 26, seats: 10 },
  { id:"T4", label:"10 hlö", size:"large",  x: 34, y: 20, seats: 10 },

  { id:"T5", label:"8 hlö",  size:"medium", x: 33, y: 38, seats: 8 },
  { id:"T6", label:"8 hlö",  size:"medium", x: 23, y: 46, seats: 8 },

  { id:"T7", label:"8 hlö",  size:"medium", x: 39, y: 48, seats: 8 },
  { id:"T8", label:"8 hlö",  size:"medium", x: 46, y: 38, seats: 8 },

  { id:"T9", label:"8 hlö",  size:"medium", x: 46, y: 22, seats: 8 }
];

// 3) Tulevaisuutta varten: istumapaikkojen nimet per pöytä
//    Lisää myöhemmin: SEAT_ASSIGNMENTS["T1"] = ["Nimi 1", "Nimi 2", ...]
const SEAT_ASSIGNMENTS = {
  // "T1": ["Hannu", "Elina", "—", ...]
};

function renderSeatingChart(){
  const host = document.getElementById("seatingChart");
  if(!host) return;

  host.innerHTML = `
    <div class="seating-top">
      <div>
        <h2 class="seating-title">Pöytäkartta</h2>
        <div class="seating-sub">Tämä on visuaalinen luonnos. Myöhemmin lisätään nimipaikat pöytiin.</div>
      </div>
      <div class="badge-row">
        <span class="badge-gray">Admin</span>
        <span class="badge-gray">Villa Vellamo</span>
      </div>
    </div>

    <div class="seating-wrap">
      <div class="seating-stage">
        <img src="${SEATING_BG_IMAGE}" alt="Pöytäkartta">
        <div class="seating-overlay" id="seatingOverlay"></div>

        <div class="seating-note">
          <strong>Vinkki:</strong> Jos haluat siirtää pöytää, muuta sen x/y arvoa (prosentteina) TABLES-listassa.
        </div>
      </div>
    </div>
  `;

  const overlay = document.getElementById("seatingOverlay");
  overlay.innerHTML = "";

  TABLES.forEach(t => {
    const el = document.createElement("div");
    el.className = `table ${t.size === "head" ? "head" : (t.size || "medium")}`;
    el.style.left = `${t.x}%`;
    el.style.top  = `${t.y}%`;

    // Näytetään pöydän label + (halutessa) montako nimeä asetettu
    const assignedCount = Array.isArray(SEAT_ASSIGNMENTS[t.id]) ? SEAT_ASSIGNMENTS[t.id].filter(Boolean).length : 0;
    const infoLine = (t.id === "head") ? "" : `<span class="hl">${t.label}</span>`;
    const smallLine = (t.id === "head") ? "" : `<span style="opacity:.85; font-weight:700; font-size:11px;">${assignedCount}/${t.seats}</span>`;

    el.innerHTML = `
      <div class="ttext">
        <span class="hl">${t.id === "head" ? "Hääpari" : ""}</span>
        ${t.id === "head" ? "" : infoLine}
        ${t.id === "head" ? "" : smallLine}
      </div>
    `;

    // Tooltip (näkyy hoverissa)
    el.title = `${t.id} • ${t.seats} paikkaa` + (assignedCount ? ` • nimetty ${assignedCount}` : "");

    overlay.appendChild(el);
  });
}

// ===============================
// INIT
// ===============================
loadRsvp();
loadPrograms();
renderSeatingChart();
</script>

</body>
</html>
