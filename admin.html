<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin – Kanteliset</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  background: #f7f3ef;
  padding: 40px;
  color: #333;
  display: none;
}

h1 {
  font-size: 34px;
  margin-bottom: 30px;
}

.section-title {
  margin-top: 60px;
  font-size: 24px;
  border-bottom: 3px solid #ddd;
  padding-bottom: 8px;
}

.summary-box {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  margin-bottom: 40px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card {
  background: white;
  padding: 24px;
  margin-bottom: 25px;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.card h3 {
  margin-top: 0;
}

.pill {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(0,0,0,0.05);
  margin-right: 8px;
  font-size: 13px;
}

.muted {
  opacity: 0.65;
}

.not-responded {
  background: #fff4f4;
  padding: 10px 15px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.highlight {
  background: #fdf8f3;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Admin – Kanteliset</h1>

<div id="rsvpSummary" class="summary-box"></div>
<div id="programSummary" class="summary-box"></div>

<div id="programs"></div>
<div id="responded"></div>
<div id="notResponded"></div>

<script>
// ===============================
// 🔐 ADMIN SUOJAUS
// ===============================
const loginRaw = sessionStorage.getItem("login");

if (!loginRaw) window.location.href = "/";

const login = JSON.parse(loginRaw);

const allowedAdmins = [
  "ADMIN-SINI",
  "ADMIN-PETE",
  "ADMIN-KAASO",
  "ADMIN-BESTMAN",
  "ADMIN-SEREMONIAM"
];

if (login.Role !== "admin" || !allowedAdmins.includes(login.FamilyId)) {
  window.location.href = "/";
}

document.body.style.display = "block";


// ===============================
// API URLIT
// ===============================
const rsvpBaseUrl =
  "https://fa-kanteliset-chdhg2g0aub8f0gy.westeurope-01.azurewebsites.net/api/rsvp/";

const programsUrl =
  "https://fa-kanteliset-chdhg2g0aub8f0gy.westeurope-01.azurewebsites.net/api/admin/programs";


// ===============================
// HELPERS
// ===============================
function escapeHtml(str){
  return (str ?? "")
    .toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function safeDate(iso){
  if(!iso) return "-";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return escapeHtml(iso);
  return d.toLocaleString("fi-FI");
}


// ===============================
// RSVP DATA
// ===============================
const familyIds = [
  "KANTELINEN-05","KANTELINEN-789","AALTONEN-029","KOISTINEN-033",
  "KOKKONEN-0458","OVASKA-059","JÄNTTI-067","KURISJÄRVI-077",
  "SALIN-083","AALAS-094","HUR-101","PUSENIUS-1155",
  "HEISKA-1289","KOSKIPALO-1341","KAITARANTA-1447","VAITTINEN-1555",
  "AUVINEN-1618","MUSTONEN-1792","PULKKINEN-1814","VESTERINEN-1999",
  "SYRJÄ-2013","LINDBLOM-2581","HELAKORPI-2291","YRJÖLÄ-2338",
  "RAUTAVUORI-2491","GAZDAG-2580","OKSMAN-2695","HURSKAINEN-2766",
  "SVENSSON-2818","TESTI-299","TESTI-288",
  "KOPONEN-688","ANTTOLAINEN-488","LAITINEN-1985"
];

let summary = { fri:0, sat:0, sun:0, spa:0 };

async function loadRsvp(){

  const responded = [];
  const notResponded = [];

  summary = { fri:0, sat:0, sun:0, spa:0 };

  for(const id of familyIds){

    try{
      const res = await fetch(rsvpBaseUrl + id);

      if(!res.ok){
        notResponded.push(id);
        continue;
      }

      const data = await res.json();

      summary.fri += data.friCount || 0;
      summary.sat += data.satCount || 0;
      summary.sun += data.sunCount || 0;

      if(data.paymentSummary && data.paymentSummary.includes("Spa")){
        summary.spa += data.friCount || 0;
      }

      responded.push(data);

    }catch{
      notResponded.push(id);
    }
  }

  renderRsvpSummary();
  renderResponded(responded);
  renderNotResponded(notResponded);
}

function renderRsvpSummary(){
  document.getElementById("rsvpSummary").innerHTML = `
    <h2>RSVP Yhteenveto</h2>
    <p><strong>Perjantai:</strong> ${summary.fri} hlö</p>
    <p><strong>Lauantai:</strong> ${summary.sat} hlö</p>
    <p><strong>Sunnuntai:</strong> ${summary.sun} hlö</p>
    <p><strong>Spa:</strong> ${summary.spa} hlö</p>
  `;
}

function renderResponded(list){

  const container = document.getElementById("responded");
  container.innerHTML = `<div class="section-title">RSVP – Vastanneet</div>`;

  list.forEach(data=>{

    const spaNames =
      (data.friAttendees || [])
        .map(p=>escapeHtml(p.name))
        .join("<br>");

    const diets =
      [...(data.satAttendees || []), ...(data.sunAttendees || [])]
      .filter(p=>p.diet && p.diet.trim() !== "" && p.diet !== "-")
      .map(p=>`${escapeHtml(p.name)}: ${escapeHtml(p.diet)}`)
      .join("<br>");

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${escapeHtml(data.displayName)}</h3>

      <div class="highlight">
        <strong>Osallistuminen:</strong><br>
        Pe: ${data.friAttending ? "Kyllä" : "Ei"} (${data.friCount})<br>
        La: ${data.satAttending ? "Kyllä" : "Ei"} (${data.satCount})<br>
        Su: ${data.sunAttending ? "Kyllä" : "Ei"} (${data.sunCount})
      </div>

      <p><strong>Majoitus:</strong> ${data.accommodation ? "Kyllä" : "Ei"}</p>

      ${spaNames ? `<p><strong>Spa-osallistujat:</strong><br>${spaNames}</p>` : ""}

      ${diets ? `<p><strong>Erikoisruokavaliot:</strong><br>${diets}</p>` : ""}

      <p><strong>Muistiinpanot:</strong><br>${escapeHtml(data.notes || "-")}</p>

      <p><strong>Maksuyhteenveto:</strong><br>${escapeHtml(data.paymentSummary || "-")}</p>
    `;

    container.appendChild(card);
  });
}

function renderNotResponded(list){
  const container=document.getElementById("notResponded");
  container.innerHTML=`<div class="section-title">Ei vielä vastanneet</div>`;

  list.forEach(id=>{
    const div=document.createElement("div");
    div.className="not-responded";
    div.innerText=id;
    container.appendChild(div);
  });
}


// ===============================
// PROGRAMS
// ===============================
async function loadPrograms(){

  const container=document.getElementById("programs");
  const summaryBox=document.getElementById("programSummary");

  try{
    const res=await fetch(programsUrl);
    if(!res.ok){
      container.innerHTML=`<div class="section-title">Ohjelmailmoitukset</div>
      <div class="card">Haku epäonnistui (${res.status})</div>`;
      return;
    }

    const programs=await res.json();

    summaryBox.innerHTML=`
      <h2>Ohjelmailmoitukset</h2>
      <p><strong>Yhteensä:</strong> ${programs.length}</p>
    `;

    container.innerHTML=`<div class="section-title">Ohjelmailmoitukset</div>`;

    programs.forEach(p=>{
      const card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <h3>${escapeHtml(p.name)}</h3>

        <div>
          <span class="pill">${escapeHtml(p.type)}</span>
          <span class="pill">${p.duration} min</span>
          <span class="pill">${p.needsMic ? "Tarvitsee mikin" : "Ei tekniikkaa"}</span>
        </div>

        <p><strong>Email:</strong> ${escapeHtml(p.email)}</p>
        <p><strong>Puhelin:</strong> ${escapeHtml(p.phone)}</p>

        <p><strong>Kuvaus:</strong><br>${escapeHtml(p.description)}</p>

        <p class="muted">Luotu: ${safeDate(p.createdUtc)}</p>
      `;

      container.appendChild(card);
    });

  }catch{
    container.innerHTML=`<div class="section-title">Ohjelmailmoitukset</div>
    <div class="card">Virhe haussa</div>`;
  }
}


// ===============================
// INIT
// ===============================
loadRsvp();
loadPrograms();

</script>

</body>
</html>
